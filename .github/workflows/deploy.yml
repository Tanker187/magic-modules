name: Build and Deploy to Firebase
on:
  push:
    branches:
      - main  # Triggers when you push to your primary branch

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Run Build Scripts
        run: |
          # Executes the generation/build process for Magic Modules
          make build
          # If you have specific scripts for the web app data, run them here:
          # bash scripts/generate_site_assets.sh

      - name: Deploy to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_NODOUBTZ }}'
          channelId: live
          projectId: nodoubtz
