name: Firebase & BigQuery Automation
on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          npm ci
          if [ -d "functions" ]; then cd functions && npm ci && cd ..; fi

      - name: Build Project
        run: npm run build

      - name: Deploy to Firebase (Hosting & Functions)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_NODOUBTZ }}'
          channelId: live
          projectId: nodoubtz

      # Explicitly deploy functions to ensure Secrets are bound
      - name: Deploy Functions with Secrets
        run: npx firebase-tools deploy --only functions --project nodoubtz
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

  refresh_bigquery:
    needs: build_and_deploy
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_NODOUBTZ }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Trigger BigQuery Transfer
        run: |
          gcloud bigquery transfer runs roll-forward \
            --project_id=nodoubtz \
            --run_time=$(date -u +%Y-%m-%dT%H:%M:%SZ) \
            ${{ secrets.BQ_TRANSFER_CONFIG_ID }}
