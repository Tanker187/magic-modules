steps:
  # Step 1: Validate Terraform configuration
  - name: 'gcr.io/cloud-builders/terraform'
    id: 'tf-validate'
    args:
      - 'validate'
    dir: 'terraform'

  # Step 2: Format check
  - name: 'gcr.io/cloud-builders/terraform'
    id: 'tf-fmt'
    args:
      - 'fmt'
      - '-check'
      - '-recursive'
    dir: 'terraform'

  # Step 3: Terraform plan (for PR checks)
  - name: 'gcr.io/cloud-builders/terraform'
    id: 'tf-plan'
    args:
      - 'plan'
      - '-out=tfplan'
    dir: 'terraform'
    env:
      - 'TF_VAR_project_id=${PROJECT_ID}'
    onFailure: ['CONTINUE']

  # Step 4: Run tests (if applicable)
  - name: 'gcr.io/cloud-builders/gke-deploy'
    id: 'run-tests'
    args:
      - 'run'
      - 'tests'
    onFailure: ['CONTINUE']

  # Step 5: Apply Terraform (only on main branch)
  - name: 'gcr.io/cloud-builders/terraform'
    id: 'tf-apply'
    args:
      - 'apply'
      - '-auto-approve'
      - 'tfplan'
    dir: 'terraform'
    env:
      - 'TF_VAR_project_id=${PROJECT_ID}'
    onFailure: ['CONTINUE']

# Only apply on main branch
onFailure: ['CONTINUE']

options:
  machineType: 'N1_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _TERRAFORM_VERSION: '1.5.0'

images:
  - 'gcr.io/$PROJECT_ID/magic-modules:latest'

artifacts:
  objects:
    location: 'gs://${PROJECT_ID}_cloudbuild/terraform'
    paths:
      - 'terraform/tfplan'
      - 'terraform/tfstate'

timeout: '3600s'
